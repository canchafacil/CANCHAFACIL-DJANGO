<script>

const ctxIngresos = document.getElementById('graficaIngresos').getContext('2d');
new Chart(ctxIngresos, {

        datasets: [{
            label: 'Ingresos ($)',

            backgroundColor: [
                'rgba(98,255,0,0.7)',
                'rgba(98,255,0,0.7)',

            borderColor: '#62ff00',

            borderSkipped: false
        }]

    options: {
